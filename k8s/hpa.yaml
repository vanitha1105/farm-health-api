apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: farm-health-api-hpa
  namespace: flox-farm

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: farm-health-api   # Target deployment to scale

  minReplicas: 2            # Minimum number of pods
  maxReplicas: 5            # Maximum number of pods allowed

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale when average CPU > 70%