apiVersion: v1                  # Core Kubernetes API version
kind: Service                   # Defines a Service (exposes Pods internally or externally)
metadata:
  name: farm-health-service     # Service name
  namespace: flox-farm          # Namespace where the Service exists
spec:
  selector:
    app: farm-health-api        # Must match Pod label to route traffic correctly
  ports:
    - protocol: TCP             # Network protocol
      port: 80                  # Port exposed by the Service (cluster-facing)
      targetPort: 8000          # Port inside the container (Pod)
  type: ClusterIP               # Internal-only service (default type)